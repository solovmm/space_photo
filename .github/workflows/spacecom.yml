name: Space.com Photo to Telegram

on:
  schedule:
    # Пн–Пт в 17:00 UTC = 20:00 по Москве
    - cron: "0 17 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  send-spacecom:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python spacecom.py

      - name: Save sent Space.com URL history
        run: |
          if git diff --quiet -- spacecom_sent_urls.json; then
            echo "No Space.com history changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add spacecom_sent_urls.json
          git commit -m "Update Space.com sent URL history"
          git push
